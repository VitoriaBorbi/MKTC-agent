<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" lang="pt-BR">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <title>{{email_subject}}</title>
  <!--[if mso]>
  <noscript><xml><o:OfficeDocumentSettings><o:AllowPNG/><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript>
  <![endif]-->
  <style type="text/css">
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; border-collapse: collapse; }
    img { border: 0; display: block; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }

    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; }
      .body-td { padding: 28px 20px !important; }
      .footer-td { padding: 16px 20px !important; }
    }

    @media (prefers-color-scheme: dark) {
      .email-bg { background-color: #111111 !important; }
      .email-container { background-color: #1e1e1e !important; }
      .header-bg { background-color: #1e1e1e !important; }
      .body-bg { background-color: #1e1e1e !important; }
      .body-text { color: #e0e0e0 !important; }
      .footer-bg { background-color: #111111 !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5;">

  <div style="font-size: 0; line-height: 0;"><custom name="opencounter" type="tracking"/><custom name="usermatch" type="tracking"/></div>

  <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all; font-size: 1px; line-height: 1px; color: #f5f5f5;">{{email_preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <table class="email-bg" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f5f5f5;">
  <tr><td align="center" style="padding: 20px 0;">

    <table width="600" cellpadding="0" cellspacing="0" border="0" class="email-container" style="background-color: #f5f5f5;">
      <tr>
        <td align="right" style="padding: 0 8px 8px 8px;">
          <span style="font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #999999;">Caso n&atilde;o consiga visualizar, <a href="%%view_email_url%%" style="color: #999999; text-decoration: underline;">clique aqui</a>.</span>
        </td>
      </tr>
    </table>

    <table width="600" cellpadding="0" cellspacing="0" border="0" class="email-container" style="background-color: #ffffff;">

      <!-- HEADER: Logo Consultor de Elite -->
      <tr>
        <td class="header-bg" align="center" style="background-color: #ffffff; padding: 24px 40px 20px 40px;">
          <a href="https://finclass.com/consultor-de-elite" style="display: inline-block;">
            <img src="https://image.mkt.finclass.com/lib/fe2811717d640478721277/m/1/8946915f-78cd-4f36-a6a5-6ac4127d9e46.png"
                 alt="Consultor de Elite" width="240" border="0" style="display: block; width: 240px; height: auto;" />
          </a>
        </td>
      </tr>

      <!-- Separador fino -->
      <tr>
        <td style="background-color: #e8e8e8; height: 1px; font-size: 1px; line-height: 1px;">&nbsp;</td>
      </tr>

      <!-- CORPO -->
      <tr>
        <td class="body-td body-bg body-text" style="background-color: #ffffff; padding: 36px 40px 28px 40px; font-family: Arial, Helvetica, sans-serif; font-size: 16px; color: #1a1a1a; line-height: 1.75;">
          {{email_corpo}}
          <!-- Estrutura típica:
          <p>Ol&aacute;, %%Nome%%</p>
          <p>Hoje, &agrave;s 19h, acontece a live com <strong>Evandro Medeiros</strong>.</p>
          <p>&#128205; Tema: <em>Contrarian Investing: por que fugir do &oacute;bvio &eacute; recompensador</em></p>
          <p>Voc&ecirc; vai entender:</p>
          <ul>
            <li>Quando vale a pena ir contra o mercado</li>
            <li>Como avaliar se uma tese est&aacute; precificada ou negligenciada</li>
          </ul>
          <p>Acesse atrav&eacute;s do <a href="{{email_cta_url}}" style="color: #092F4F; font-weight: bold;">link de transmiss&atilde;o</a>.</p>
          <p>Te esperamos.</p>
          <p><strong>Equipe Consultor de Elite</strong></p>
          -->
        </td>
      </tr>

      <!-- FOOTER: sem social icons (padrão Consultor de Elite) -->
      <tr>
        <td class="footer-td footer-bg" align="center" style="background-color: #ffffff; padding: 16px 40px 24px 40px; border-top: 1px solid #eeeeee;">
          <table cellpadding="0" cellspacing="0" border="0" align="center" style="margin-bottom: 12px;">
            <tr>
              <td style="padding: 0 10px;">
                <a href="%%=CloudPagesURL(35, 'email', emailaddr, 'jobID', jobid, 'emailName', emailname_)=%%" style="font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #cacaca; text-decoration: none;">Cancelar e-mails</a>
              </td>
              <td style="font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #e0e0e0;">|</td>
              <td style="padding: 0 10px;">
                <a href="" style="font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #cacaca; text-decoration: none;">Termos de uso</a>
              </td>
              <td style="font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #e0e0e0;">|</td>
              <td style="padding: 0 10px;">
                <a href="" style="font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #cacaca; text-decoration: none;">Pol&iacute;tica e privacidade</a>
              </td>
            </tr>
          </table>
          <p style="font-family: Verdana, Geneva, sans-serif; font-size: 10px; color: #b0b0b0; margin: 0; line-height: 1.6; text-align: center;">
            <strong>%%Member_Busname%%</strong><br/>
            %%Member_Addr%% %%Member_City%%, %%Member_State%%, %%Member_PostalCode%%, %%Member_Country%%
          </p>
        </td>
      </tr>

    </table>

  </td></tr>
  </table>

</body>
</html>
