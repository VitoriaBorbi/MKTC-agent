<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 800px; height: 418px; overflow: hidden;
    background: #02020f;
    font-family: Arial, Helvetica, sans-serif;
  }

  /* ─── ESPAÇO: fundo nebulosa ─── */
  .space-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 90% at 25% 50%, rgba(8,12,60,0.95) 0%, transparent 100%),
      radial-gradient(ellipse 55% 70% at 72% 35%, rgba(20,0,55,0.7) 0%, transparent 100%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(0,30,80,0.5) 0%, transparent 100%),
      #02020f;
  }

  /* ─── ESTRELAS (CSS puro) ─── */
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at  6%  8%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 14% 72%, #cde 80%, transparent 100%),
      radial-gradient(1.5px 1.5px at 21% 31%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 29% 55%, #aac 80%, transparent 100%),
      radial-gradient(1px 1px at 34%  4%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 41% 88%, #ddf 80%, transparent 100%),
      radial-gradient(1.5px 1.5px at 48% 42%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 51% 18%, #cde 80%, transparent 100%),
      radial-gradient(1px 1px at  3% 44%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 10% 91%, #aac 80%, transparent 100%),
      radial-gradient(1.5px 1.5px at 17% 17%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 25% 63%, #ddf 80%, transparent 100%),
      radial-gradient(1px 1px at 37% 78%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 45%  6%, #cde 80%, transparent 100%),
      radial-gradient(1px 1px at 57% 95%, #fff 80%, transparent 100%),
      radial-gradient(1.5px 1.5px at 61% 26%, #aac 80%, transparent 100%),
      radial-gradient(1px 1px at  8% 58%, #fff 80%, transparent 100%),
      radial-gradient(1px 1px at 31% 12%, #ddf 80%, transparent 100%);
    background-repeat: no-repeat;
  }

  /* ─── GLOW verde atrás do Barsi ─── */
  .alien-glow {
    position: absolute;
    right: -20px; top: -50px;
    width: 520px; height: 520px;
    background: radial-gradient(ellipse at 42% 42%,
      rgba(140,255,77,0.18) 0%,
      rgba(60,200,80,0.07) 35%,
      transparent 65%);
    mix-blend-mode: screen;
  }

  /* ─── SCANLINE sutil (efeito radar/ET) ─── */
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
  }

  /* ─── FOTO BARSI ─── */
  .barsi-wrap {
    position: absolute;
    right: -20px; bottom: 0;
    width: 520px; height: 520px;
    overflow: hidden;
  }
  .barsi-wrap img {
    position: absolute;
    right: 0; bottom: 0;
    width: 520px;
    height: auto;
    mix-blend-mode: screen;
    filter: brightness(1.18) contrast(1.06) saturate(0.88);
  }

  /* gradiente esquerda + topo sobre a foto (blend suave) */
  .barsi-fade {
    position: absolute;
    right: -20px; bottom: 0;
    width: 520px; height: 520px;
    background:
      linear-gradient(to right, #02020f 0%, transparent 22%),
      linear-gradient(to bottom, #02020f 0%, transparent 18%);
    pointer-events: none;
  }

  /* ─── HEADLINE única ─── */
  .content {
    position: absolute;
    left: 0; top: 0;
    width: 360px; height: 418px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 38px;
  }

  .headline {
    font-size: 29px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.22;
  }

  .headline em {
    color: #8cff4d;
    font-style: normal;
  }

  /* ─── vinheta border ─── */
  .vinheta {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.55);
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="space-bg"></div>
  <div class="stars"></div>
  <div class="alien-glow"></div>

  <!-- foto Barsi -->
  <div class="barsi-wrap">
    <img src="file:///C:/Users/vitoria.esteves/Downloads/DSC2276bx.webp" />
  </div>
  <div class="barsi-fade"></div>

  <!-- conteúdo -->
  <div class="content">
    <h1 class="headline">O c&oacute;digo <em>alien&iacute;gena</em><br/>que faz bilh&otilde;es<br/>em dividendos</h1>
  </div>

  <div class="scanlines"></div>
  <div class="vinheta"></div>

</body>
</html>
