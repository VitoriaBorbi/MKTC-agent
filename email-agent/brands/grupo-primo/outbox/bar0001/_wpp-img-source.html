<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 418px; overflow: hidden;
    background-color: #05060f;
    background-image:
      radial-gradient(1px 1px at 8%  12%, #fff 60%, transparent 100%),
      radial-gradient(1px 1px at 22% 80%, #cfe3ff 60%, transparent 100%),
      radial-gradient(1.5px 1.5px at 38% 25%, #fff 60%, transparent 100%),
      radial-gradient(1px 1px at 55% 70%, #b7c8ff 60%, transparent 100%),
      radial-gradient(1px 1px at 68% 15%, #fff 60%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 55%, #e8f0ff 60%, transparent 100%),
      radial-gradient(1px 1px at 92% 35%, #fff 60%, transparent 100%),
      radial-gradient(1px 1px at 15% 48%, #cfe3ff 60%, transparent 100%),
      radial-gradient(1px 1px at 47% 90%, #fff 60%, transparent 100%),
      radial-gradient(1px 1px at 73% 82%, #b7c8ff 60%, transparent 100%);
    font-family: Arial, Helvetica, sans-serif;
  }

  /* glow central */
  .glow {
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse at 50% 30%, rgba(140,255,77,0.22) 0%, transparent 65%);
    pointer-events: none;
  }

  /* legado banner */
  .banner {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 80px;
    overflow: hidden;
  }
  .banner img {
    width: 800px;
    height: auto;
    object-fit: cover;
    object-position: center top;
  }

  /* linha neon */
  .neon-line {
    position: absolute;
    top: 80px; left: 0; right: 0;
    height: 2px;
    background: #8cff4d;
  }

  /* conteúdo central */
  .content {
    position: absolute;
    top: 92px; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 0 60px;
  }

  .tag {
    font-size: 11px;
    color: #8cff4d;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .saucer {
    font-size: 52px;
    line-height: 1;
    filter: drop-shadow(0 0 18px rgba(140,255,77,0.7));
  }

  .headline {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    text-align: center;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .headline span { color: #8cff4d; }

  .sub {
    font-size: 14px;
    color: #aab4d4;
    text-align: center;
    letter-spacing: 0.3px;
  }

  .pill {
    margin-top: 6px;
    background: rgba(255,214,107,0.12);
    border: 1px solid rgba(255,214,107,0.4);
    border-radius: 40px;
    padding: 6px 20px;
    font-size: 13px;
    font-weight: 700;
    color: #FFD66B;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="banner">
    <img src="https://image.m.grupo-primo.com/lib/fe2611717d640479731d78/m/1/7e965f0e-cfcc-4296-9357-b82518c1d912.png" />
  </div>
  <div class="neon-line"></div>

  <div class="content">
    <p class="tag">// sinal detectado</p>
    <div class="saucer">&#128760;</div>
    <h1 class="headline">Um código <span>alienígena</span><br/>que faz bilhões em dividendos</h1>
    <p class="sub">O maior investidor PF da bolsa abre o manual</p>
    <div class="pill">O Legado &nbsp;·&nbsp; Grupo Primo + AGF &nbsp;·&nbsp; 16/06</div>
  </div>
</body>
</html>
